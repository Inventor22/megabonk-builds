<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Megabonk Build Reference</title>
  <style>
    :root {
      --bg-0: #1a1a2e;
      --bg-1: #16213e;
      --bg-2: #0f3460;
      --jump-bar-height: 0px;
      --panel: rgba(15, 52, 96, 0.78);
      --panel-soft: rgba(8, 13, 29, 0.66);
      --panel-strong: rgba(11, 21, 44, 0.9);
      --ink: #f8f9fa;
      --muted: #aeb8d4;
      --accent-1: #9d4edd;
      --accent-2: #3a86ff;
      --accent-3: #ff006e;
      --line: rgba(157, 78, 221, 0.22);
      --line-strong: rgba(58, 134, 255, 0.24);
      --tag-bg: rgba(255, 255, 255, 0.08);
      --tag-line: rgba(157, 78, 221, 0.24);
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(157, 78, 221, 0.18), transparent 26%),
        radial-gradient(circle at top right, rgba(58, 134, 255, 0.16), transparent 24%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 28%, #13162b 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.08));
    }

    main {
      width: min(1460px, calc(100% - 24px));
      margin: 0 auto;
      padding: 14px 0 calc(var(--jump-bar-height) + 28px);
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: grid;
      gap: 14px;
      grid-template-columns: auto minmax(280px, 520px);
      align-items: center;
      padding: 14px 18px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(15, 52, 96, 0.72), rgba(22, 33, 62, 0.84));
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 36px -28px var(--shadow);
    }

    .brand {
      min-width: 0;
    }

    .brand-mark,
    .brand-copy,
    .card-title,
    .card-meta,
    .row-name,
    .row-hint,
    .result-count,
    .entry-name,
    .tag,
    .source-link,
    .jump-link,
    .empty-state,
    .no-results,
    .sr-only {
      margin: 0;
    }

    .brand-mark {
      display: inline-block;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand-copy {
      margin-top: 4px;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .search-panel {
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .search-shell {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      width: min(100%, 460px);
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid rgba(157, 78, 221, 0.28);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(9, 14, 29, 0.86), rgba(18, 28, 54, 0.92));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 0 0 1px rgba(58, 134, 255, 0.06);
    }

    .search-shell:focus-within {
      border-color: rgba(58, 134, 255, 0.46);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 0 1px rgba(58, 134, 255, 0.16),
        0 0 28px -16px rgba(58, 134, 255, 0.78);
    }

    .search-icon {
      color: #93a9ff;
      font-size: 0.96rem;
      line-height: 1;
    }

    .search-input {
      width: 100%;
      min-width: 0;
      height: 44px;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
    }

    .search-input::placeholder {
      color: #7f90b9;
    }

    .result-count {
      display: none;
    }

    .jump-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      transform: none;
      z-index: 7;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
      justify-content: flex-start;
      width: 100%;
      max-width: none;
      max-height: none;
      overflow: visible;
      padding: 12px max(12px, calc((100vw - 1460px) / 2 + 12px));
      margin: 0;
      border-top: 1px solid rgba(157, 78, 221, 0.22);
      background: linear-gradient(180deg, rgba(7, 11, 24, 0.98), rgba(9, 14, 30, 0.99));
      backdrop-filter: blur(14px);
      box-shadow: 0 -16px 32px -28px var(--shadow);
    }

    .jump-link {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      width: auto;
      min-height: 30px;
      padding: 6px 12px;
      border: 1px solid rgba(157, 78, 221, 0.16);
      border-radius: 999px;
      background: rgba(15, 52, 96, 0.48);
      color: var(--ink);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .jump-icon {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      padding: 5px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      object-fit: contain;
    }

    .jump-link-label {
      display: inline-block;
    }

    .jump-link:hover {
      background: linear-gradient(135deg, rgba(157, 78, 221, 0.22), rgba(58, 134, 255, 0.18));
      border-color: rgba(58, 134, 255, 0.28);
    }

    .cards {
      display: grid;
      gap: 16px;
    }

    .character-card {
      scroll-margin-top: 74px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(15, 52, 96, 0.84), rgba(21, 26, 46, 0.96));
      box-shadow: 0 22px 42px -34px var(--shadow);
    }

    .card-header {
      display: grid;
      gap: 14px;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(157, 78, 221, 0.16);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015));
    }

    .character-avatar {
      width: 64px;
      height: 64px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      object-fit: contain;
    }

    .card-title-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      align-items: center;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: clamp(1.18rem, 2vw, 1.75rem);
      line-height: 1.04;
    }

    .tier-pill,
    .build-pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: #e8ecff;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .build-pill {
      border-color: rgba(58, 134, 255, 0.2);
      background: linear-gradient(135deg, rgba(157, 78, 221, 0.18), rgba(58, 134, 255, 0.18));
    }

    .card-meta {
      display: none;
    }

    .source-link {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid rgba(157, 78, 221, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--ink);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .source-link:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(58, 134, 255, 0.28);
    }

    .rows {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .info-row {
      display: grid;
      gap: 12px;
      grid-template-columns: 148px minmax(0, 1fr);
      align-items: start;
      padding: 12px;
      border: 1px solid rgba(157, 78, 221, 0.14);
      border-radius: 18px;
      background: rgba(7, 12, 26, 0.28);
    }

    .row-label {
      display: grid;
      gap: 4px;
      align-content: start;
      padding-top: 2px;
    }

    .row-name {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #93a9ff;
    }

    .row-hint {
      display: none;
    }

    .row-items {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
      min-width: 0;
    }

    .entry {
      display: inline-flex;
      flex: 0 1 auto;
      align-items: center;
      gap: 10px;
      width: fit-content;
      min-width: 0;
      max-width: min(100%, 320px);
      min-height: 58px;
      padding: 8px 10px;
      border: 1px solid rgba(157, 78, 221, 0.18);
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(157, 78, 221, 0.14), rgba(58, 134, 255, 0.12));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .entry-icon {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      padding: 5px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      object-fit: contain;
    }

    .entry-copy {
      min-width: 0;
    }

    .entry-name {
      display: block;
      margin-bottom: 4px;
      font-size: 0.92rem;
      line-height: 1.15;
      font-weight: 700;
      word-break: break-word;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      max-width: 100%;
      padding: 4px 8px;
      border: 1px solid var(--tag-line);
      border-radius: 999px;
      background: rgba(10, 16, 34, 0.72);
      color: #dce8ff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1.2;
      white-space: normal;
    }

    .empty-state {
      padding: 10px 12px;
      border: 1px dashed rgba(157, 78, 221, 0.18);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .no-results {
      padding: 18px 20px;
      border: 1px solid rgba(157, 78, 221, 0.18);
      border-radius: 18px;
      background: rgba(10, 16, 34, 0.74);
      color: var(--muted);
      font-size: 0.96rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1100px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .search-panel {
        justify-items: stretch;
      }

      .search-shell {
        width: 100%;
      }

      .card-header {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .source-link {
        grid-column: 1 / -1;
        justify-self: start;
      }
    }

    @media (max-width: 880px) {
      .info-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      main {
        width: min(100% - 18px, 1460px);
        padding-top: 10px;
        padding-bottom: calc(var(--jump-bar-height) + 18px);
      }

      .topbar,
      .card-header,
      .rows {
        padding-left: 12px;
        padding-right: 12px;
      }

      .jump-bar {
        padding: 10px 9px;
      }

      .character-avatar {
        width: 56px;
        height: 56px;
      }

      .entry {
        max-width: none;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <div class="brand">
        <p class="brand-mark">Megabonk.org</p>
        <p class="brand-copy">Quick-reference rows for every character build.</p>
      </div>
      <div class="search-panel">
        <label class="sr-only" for="character-search">Search builds</label>
        <div class="search-shell">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input class="search-input" id="character-search" type="search" placeholder="Search character, build, weapon, tome, or item" autocomplete="off">
        </div>
        <div class="result-count" id="result-count"></div>
      </div>
    </header>

    <section class="cards" id="cards" aria-live="polite"></section>
    <nav class="jump-bar" id="jump-bar" aria-label="Character jump links"></nav>
  </main>

  <script>
    const builds = JSON.parse(document.getElementById("build-data").textContent);
    const cardsElement = document.getElementById("cards");
    const jumpBarElement = document.getElementById("jump-bar");
    const resultCountElement = document.getElementById("result-count");
    const searchInput = document.getElementById("character-search");

    const escapeHtml = (value) => String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");

    const stripLeadingDecoration = (value) => String(value ?? "").replace(/^[^\p{L}\p{N}]+/u, "").trim();

    const baseCharacterName = (value) => stripLeadingDecoration(String(value ?? "").replace(/\s*\(.+?\)/g, "").replace(/\s+/g, " "));

    const deriveBuildLabel = (characterName, buildTitle) => {
      const cleanedTitle = stripLeadingDecoration(buildTitle);
      const cleanedName = baseCharacterName(characterName);

      if (!cleanedTitle) {
        return "";
      }

      if (cleanedName && cleanedTitle.toLowerCase().startsWith(cleanedName.toLowerCase())) {
        const remainder = cleanedTitle.slice(cleanedName.length).trim();
        return remainder || cleanedTitle;
      }

      return cleanedTitle;
    };

    const toAnchor = (value) => stripLeadingDecoration(value)
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/(^-|-$)/g, "");

    const allEntryText = (items) => items.flatMap((item) => [item.name, item.tag].filter(Boolean)).join(" ");

    const hasLeadingIcon = (tag) => /^(?:[\p{Extended_Pictographic}★☆⭐✨🔥⚡🎯🛡📚🎁💥🍀⏱🔄💰❤️🧲🌀❄☠📈🩸🪞💪📦🗡⚔])/u.test(tag.trim());

    const fallbackTagIcon = (rowLabel) => {
      if (rowLabel === 'Core Weapons') {
        return '⚔️';
      }

      if (rowLabel === 'Tome Priority') {
        return '📚';
      }

      return '🎁';
    };

    const pickTagIcon = (tag, rowLabel) => {
      const value = String(tag ?? '').toLowerCase();
      const rules = [
        [/core|mandatory|primary weapons?/, rowLabel === 'Core Weapons' ? '⚔️' : fallbackTagIcon(rowLabel)],
        [/popular|high|top|essential/, '🔥'],
        [/flex|alternative|optional|situational|filler|alt\b/, '🔄'],
        [/early|tempo|opener|rush|foundation/, '⏱️'],
        [/mid|late|scaling|snowball|recommended|copies/, '📈'],
        [/survival|defen|shield|safety|utility|comfort/, '🛡️'],
        [/economy|gold|coin|chest/, '💰'],
        [/attack speed|\bas\b|cooldown|uptime/, '⚡'],
        [/xp|level|vac/, '✨'],
        [/luck/, '🍀'],
        [/hp|heal|regen|sustain/, '❤️'],
        [/damage|dps|blast|burst|crit/, '💥']
      ];

      for (const [pattern, icon] of rules) {
        if (pattern.test(value)) {
          return icon;
        }
      }

      return fallbackTagIcon(rowLabel);
    };

    const formatTag = (tag, rowLabel) => {
      const cleaned = String(tag ?? '').trim();
      if (!cleaned) {
        return '';
      }

      if (hasLeadingIcon(cleaned)) {
        return cleaned;
      }

      return pickTagIcon(cleaned, rowLabel) + ' ' + cleaned;
    };

    const buildSearchText = (build) => [
      build.characterName,
      build.buildTitle,
      build.tier,
      allEntryText(build.coreWeapons || []),
      allEntryText(build.tomePriority || []),
      allEntryText(build.keyItems || [])
    ].join(" ").toLowerCase();

    const renderEntries = (items, rowLabel) => {
      if (!items.length) {
        return '<p class="empty-state">Not listed on the source page.</p>';
      }

      return items.map((item) => {
        const formattedTag = formatTag(item.tag, rowLabel);
        const tag = formattedTag ? '<span class="tag">' + escapeHtml(formattedTag) + '</span>' : '';
        const summary = [item.name, formattedTag].filter(Boolean).join(' • ');
        return '' +
          '<article class="entry" title="' + escapeHtml(summary) + '">' +
            '<img class="entry-icon" src="' + escapeHtml(item.image) + '" alt="' + escapeHtml(item.name) + '" loading="lazy">' +
            '<div class="entry-copy">' +
              '<span class="entry-name">' + escapeHtml(item.name) + '</span>' +
              tag +
            '</div>' +
          '</article>';
      }).join('');
    };

    const renderRow = (label, items) => {
      return '' +
        '<section class="info-row">' +
          '<div class="row-label">' +
            '<p class="row-name">' + escapeHtml(label) + '</p>' +
          '</div>' +
          '<div class="row-items">' + renderEntries(items, label) + '</div>' +
        '</section>';
    };

    const renderCard = (build) => {
      const anchor = toAnchor(build.characterName || build.buildTitle || build.url);
      const buildLabel = deriveBuildLabel(build.characterName, build.buildTitle);
      const tierPill = build.tier ? '<span class="tier-pill">' + escapeHtml(build.tier) + '</span>' : '';
      const buildPill = buildLabel ? '<span class="build-pill">' + escapeHtml(buildLabel) + '</span>' : '';
      return '' +
        '<section class="character-card" id="' + escapeHtml(anchor) + '">' +
          '<header class="card-header">' +
            '<img class="character-avatar" src="' + escapeHtml(build.characterImage) + '" alt="' + escapeHtml(build.characterName) + '" loading="lazy">' +
            '<div>' +
              '<div class="card-title-row">' +
                '<h2 class="card-title">' + escapeHtml(build.characterName) + '</h2>' +
                tierPill +
                buildPill +
              '</div>' +
            '</div>' +
            '<a class="source-link" href="' + escapeHtml(build.url) + '">Original</a>' +
          '</header>' +
          '<div class="rows">' +
            renderRow('Core Weapons', build.coreWeapons || []) +
            renderRow('Tome Priority', build.tomePriority || []) +
            renderRow('Key Items', build.keyItems || []) +
          '</div>' +
        '</section>';
    };

    const renderJumpBar = (items) => {
      jumpBarElement.hidden = items.length === 0;

      if (!items.length) {
        jumpBarElement.innerHTML = '';
        return;
      }

      jumpBarElement.innerHTML = items.map((build) => {
        const anchor = toAnchor(build.characterName || build.buildTitle || build.url);
        return '<a class="jump-link" href="#' + escapeHtml(anchor) + '">' +
          '<img class="jump-icon" src="' + escapeHtml(build.characterImage) + '" alt="" loading="lazy">' +
          '<span class="jump-link-label">' + escapeHtml(baseCharacterName(build.characterName)) + '</span>' +
        '</a>';
      }).join('');
    };

    const syncJumpBarOffset = () => {
      const height = jumpBarElement.hidden ? 0 : Math.ceil(jumpBarElement.getBoundingClientRect().height);
      document.documentElement.style.setProperty('--jump-bar-height', height + 'px');
    };

    const renderBuilds = (query = '') => {
      const normalizedQuery = query.trim().toLowerCase();
      const filtered = normalizedQuery
        ? builds.filter((build) => buildSearchText(build).includes(normalizedQuery))
        : builds;

      resultCountElement.textContent = '';

      renderJumpBar(filtered);
      syncJumpBarOffset();

      if (!filtered.length) {
        cardsElement.innerHTML = '<div class="no-results">No characters or build entries match that search.</div>';
        return;
      }

      cardsElement.innerHTML = filtered.map(renderCard).join('');
    };

    searchInput.addEventListener('input', (event) => {
      renderBuilds(event.target.value);
    });

    window.addEventListener('resize', syncJumpBarOffset);

    renderBuilds();
  </script>
</body>
</html>
